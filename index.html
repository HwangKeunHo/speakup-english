<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SpeakUp - 영어회화 반복연습</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #6366F1;
  --primary-light: #A5B4FC;
  --primary-dark: #4338CA;
  --success: #10B981;
  --success-light: #D1FAE5;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --danger: #F97316;
  --danger-light: #FFF7ED;
  --mic: #8B5CF6;
  --mic-light: #EDE9FE;
  --bg: #FAFAF9;
  --bg-warm: #FFF8F0;
  --card: #FFFFFF;
  --text: #1C1917;
  --text-secondary: #78716C;
  --border: #E7E5E4;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-user-select: none;
  user-select: none;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
}

/* Main Content */
.main { flex: 1; padding: 16px; padding-bottom: 76px; overflow-y: auto; }

/* Tab Navigation - 3 tabs */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: none;
  transition: color 0.2s;
  font-weight: 500;
}
.tab-item.active { color: var(--primary); font-weight: 700; }
.tab-item .tab-icon { font-size: 26px; margin-bottom: 2px; }

/* Cards */
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Dashboard */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-box {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-number { font-size: 26px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

/* Big hero start button */
.hero-start {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(99,102,241,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  transition: transform 0.15s;
  line-height: 1.4;
}
.hero-start:active { transform: scale(0.95); }
.hero-start .hero-count { font-size: 32px; font-weight: 800; }
.hero-start .hero-label { font-size: 14px; opacity: 0.9; }

.start-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
  box-shadow: 0 4px 14px rgba(99,102,241,0.35);
  transition: transform 0.1s;
}
.start-btn:active { transform: scale(0.97); }

.progress-bar-container {
  background: var(--border);
  border-radius: 8px;
  height: 8px;
  overflow: hidden;
  margin: 8px 0;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 8px;
  transition: width 0.5s ease;
}

/* Mode card buttons */
.mode-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.mode-card {
  flex: 1;
  background: var(--card);
  border-radius: 14px;
  padding: 16px 10px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.1s;
  border: 2px solid transparent;
}
.mode-card:active { transform: scale(0.97); }
.mode-card .mode-icon { font-size: 28px; margin-bottom: 4px; }
.mode-card .mode-name { font-size: 13px; font-weight: 600; }

/* Sentence Management */
.search-box {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  margin-bottom: 12px;
  outline: none;
  background: var(--card);
}
.search-box:focus { border-color: var(--primary); }

.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-chip {
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: white;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-chip.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.sentence-item {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.1s;
}
.sentence-item:active { transform: scale(0.99); }
.sentence-english { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.sentence-korean { font-size: 13px; color: var(--text-secondary); }
.sentence-meta {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.sentence-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #EEF2FF;
  color: var(--primary);
}
.sentence-level {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}
.level-new { background: #DBEAFE; color: #1D4ED8; }
.level-learning { background: var(--warning-light); color: #92400E; }
.level-mastered { background: var(--success-light); color: #065F46; }

/* Study Mode */
.study-container { text-align: center; }
.study-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.study-back-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-secondary);
  padding: 4px 8px;
}
.study-progress-bar {
  flex: 1;
  height: 5px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin: 0 12px;
}
.study-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 3px;
  transition: width 0.3s;
}
.study-counter { font-size: 13px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; }

.study-step-label {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 12px;
}
.step-listen { background: #EDE9FE; color: #6D28D9; }
.step-repeat { background: var(--warning-light); color: #92400E; }
.step-speak { background: #FFF1F2; color: #BE123C; }

.study-sentence-card {
  background: linear-gradient(135deg, #F0EAFF 0%, #FFF7ED 100%);
  border-radius: 20px;
  padding: 36px 22px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-lg);
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border: 1px solid rgba(139, 92, 246, 0.1);
}
.study-english {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.4;
  margin-bottom: 14px;
  color: var(--text);
}
.study-korean {
  font-size: 19px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.study-nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.study-nav-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s;
}
.study-nav-btn:active { background: #EDE9FE; transform: scale(0.96); }
.study-nav-btn:disabled { opacity: 0.3; pointer-events: none; }
.study-hidden { filter: blur(10px); cursor: pointer; transition: filter 0.3s; }
.study-hidden:active { filter: blur(4px); }

.repeat-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 10px;
}
.repeat-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}
.repeat-dot.done { background: var(--success); }
.repeat-dot.current { background: var(--primary); animation: pulse 1s infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

.speed-label {
  font-size: 12px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 8px;
}

.study-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.action-btn {
  padding: 14px 24px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.action-btn:active { transform: scale(0.95); }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 14px rgba(99,102,241,0.3);
}
.btn-secondary {
  background: var(--border);
  color: var(--text);
}
.btn-ghost {
  background: none;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 14px;
  padding: 8px 16px;
}

/* Mic button */
.btn-mic {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--mic), #7C3AED);
  color: white;
  font-size: 28px;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(139,92,246,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.btn-mic.recording {
  animation: mic-pulse 1s infinite;
  background: linear-gradient(135deg, #7C3AED, #6D28D9);
}
@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.5); }
  50% { box-shadow: 0 0 0 18px rgba(139,92,246,0); }
}

/* Big main action button for study */
.main-action-btn {
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  border: none;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.1s;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 14px rgba(99,102,241,0.3);
  margin-bottom: 10px;
}
.main-action-btn:active { transform: scale(0.97); }
.main-action-btn.mic-action {
  background: linear-gradient(135deg, var(--mic), #7C3AED);
  box-shadow: 0 4px 14px rgba(139,92,246,0.3);
}

/* Mic inline wave (small) */
.mic-inline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 24px;
  margin: 8px 0;
}
.mic-inline-bar {
  width: 3px;
  border-radius: 2px;
  background: var(--mic);
  animation: wave-bar 0.8s ease-in-out infinite;
}
.mic-inline-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.mic-inline-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.mic-inline-bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
.mic-inline-bar:nth-child(4) { height: 16px; animation-delay: 0.3s; }
.mic-inline-bar:nth-child(5) { height: 10px; animation-delay: 0.15s; }
@keyframes wave-bar {
  0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
  50% { transform: scaleY(1.0); opacity: 1; }
}

/* Fixed speech area */
.speech-area {
  background: var(--mic-light);
  border: 2px solid #C4B5FD;
  border-radius: 14px;
  padding: 14px;
  margin: 12px 0;
  min-height: 52px;
  font-size: 16px;
  color: var(--text);
  text-align: center;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.speech-area.recording { border-color: var(--mic); cursor: pointer; }
.speech-area .placeholder { color: #A78BFA; font-style: italic; }

/* Study start overlay */
.study-start-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
.study-start-modal {
  background: white;
  border-radius: 28px;
  padding: 40px 28px;
  text-align: center;
  max-width: 340px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  animation: modal-pop 0.3s ease;
}
@keyframes modal-pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.study-start-modal h2 { margin-bottom: 8px; font-size: 22px; }
.study-start-modal .start-count { font-size: 48px; font-weight: 800; color: var(--primary); }
.study-start-modal .start-desc { font-size: 14px; color: var(--text-secondary); margin: 8px 0 24px; }
.study-start-go {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 16px;
  padding: 16px 48px;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(99,102,241,0.3);
  transition: transform 0.2s;
}
.study-start-go:active { transform: scale(0.95); }

/* Dual action buttons row */
.dual-action-row {
  display: flex;
  gap: 10px;
  margin: 12px 0;
}
.dual-action-btn {
  flex: 1;
  padding: 16px 8px;
  border: none;
  border-radius: 16px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.2s;
}
.dual-action-btn:active { transform: scale(0.96); }
.dual-action-btn.listen-btn { background: linear-gradient(135deg, var(--primary), #818CF8); color: white; }
.dual-action-btn.speak-btn { background: linear-gradient(135deg, var(--mic), #A78BFA); color: white; }
.dual-action-btn.repeat100-btn { background: linear-gradient(135deg, #F59E0B, #F97316); color: white; font-size: 14px; }

/* Repeat counter badges */
.repeat-count-badges {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 8px;
  flex-wrap: wrap;
}
.repeat-count-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 12px;
}
.badge-listen { background: #DBEAFE; color: #1E40AF; }
.badge-speak { background: #EDE9FE; color: #5B21B6; }

/* Recording timer */
.rec-timer {
  font-size: 12px;
  color: var(--danger);
  font-weight: 600;
  margin-top: 4px;
}

/* 100-repeat popup overlay */
.repeat100-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1100;
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
.repeat100-popup {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
}
.repeat100-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.repeat100-header h3 { font-size: 16px; margin: 0; }
.repeat100-counter {
  font-size: 20px;
  font-weight: 800;
}
.repeat100-stop {
  background: rgba(255,255,255,0.2);
  border: 1.5px solid rgba(255,255,255,0.5);
  color: white;
  border-radius: 10px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.repeat100-sentence-display {
  flex-shrink: 0;
  background: linear-gradient(135deg, #F0EAFF 0%, #FFF7ED 100%);
  padding: 24px 20px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.repeat100-sentence-display .r100-english {
  font-size: 24px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}
.repeat100-sentence-display .r100-korean {
  font-size: 15px;
  color: var(--text-secondary);
}
.repeat100-log {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  background: #FAFAF9;
  display: flex;
  flex-direction: column;
}
.repeat100-log-item {
  padding: 10px 14px;
  margin-bottom: 6px;
  border-radius: 12px;
  font-size: 14px;
  animation: log-slide-down 0.3s ease;
}
.repeat100-log-item.listen-log {
  background: #DBEAFE;
  color: #1E40AF;
}
.repeat100-log-item.speak-log {
  background: #EDE9FE;
  color: #5B21B6;
}
.repeat100-log-item .log-num {
  font-weight: 800;
  margin-right: 6px;
}
.repeat100-log-item .log-score {
  float: right;
  font-weight: 700;
}
.repeat100-current-sentence {
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  color: white;
  padding: 20px 16px;
  border-radius: 16px;
  margin-bottom: 8px;
  text-align: center;
  font-size: 20px;
  font-weight: 800;
  line-height: 1.5;
  box-shadow: 0 4px 16px rgba(79,70,229,0.3);
}
.repeat100-current-sentence .current-label {
  font-size: 11px;
  font-weight: 600;
  opacity: 0.8;
  margin-bottom: 4px;
}
.repeat100-listen-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 0;
  flex-shrink: 0;
  background: #F8F7FF;
  border-bottom: 1px solid var(--border);
}
.listen-toggle-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 20px;
  border: 2px solid var(--primary);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.listen-toggle-btn.on {
  background: var(--primary);
  color: white;
}
.listen-toggle-btn.off {
  background: white;
  color: var(--primary);
}
@keyframes log-slide-down {
  from { opacity: 0; transform: translateY(-15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Word diff highlight */
.word-correct { color: var(--success); font-weight: 700; }
.word-wrong { color: #DC2626; font-weight: 700; text-decoration: line-through; background: #FEE2E2; padding: 2px 6px; border-radius: 6px; border: 1px solid #FECACA; }
.word-missing { color: #9CA3AF; font-weight: 600; background: #F3F4F6; padding: 2px 6px; border-radius: 6px; border: 1px dashed #D1D5DB; }

/* Score badge */
.score-badge {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 800;
  margin: 8px 0;
}
.score-high { background: var(--success-light); color: #065F46; }
.score-medium { background: var(--warning-light); color: #92400E; }
.score-low { background: var(--danger-light); color: #9A3412; }

/* Result card */
.result-card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  margin: 12px 0;

<body>

<!-- Header -->
<div class="header">
  <h1 id="headerTitle">SpeakUp</h1>
  <button class="header-btn" id="settingsBtn" onclick="switchTab('profile')">&#9881;</button>
</div>

<!-- Main Content Area -->
<div class="main" id="mainContent"></div>

<!-- Tab Bar (3 tabs) -->
<nav class="tab-bar">
  <button class="tab-item active" data-tab="practice" onclick="switchTab('practice')">
    <span class="tab-icon">&#127919;</span>
    <span>연습</span>
  </button>
  <button class="tab-item" data-tab="sentences" onclick="switchTab('sentences')">
    <span class="tab-icon">&#128213;</span>
    <span>내 문장</span>
  </button>
  <button class="tab-item" data-tab="profile" onclick="switchTab('profile')">
    <span class="tab-icon">&#128100;</span>
    <span>나</span>
  </button>
</nav>

<script>
// ===== DATA STORE =====
const DB_KEY = 'speakup_data';
const DEFAULT_SETTINGS = {
  listenRepeat: 3,
  speakRepeat: 3,
  dailyGoal: 20,
  speechRate: 1.0,
  repeatSpeed: 1.0,
};

let state = {
  sentences: [],
  favorites: [],
  studyLogs: [],
  settings: { ...DEFAULT_SETTINGS },
  totalPracticeCount: 0,
  streak: 0,
};

function loadState() {
  try {
    const saved = localStorage.getItem(DB_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      if (!state.settings) state.settings = { ...DEFAULT_SETTINGS };
      if (!state.settings.speechRate) state.settings.speechRate = 1.0;
      if (!state.favorites) state.favorites = [];
      if (!state.totalPracticeCount) state.totalPracticeCount = 0;
    }
  } catch(e) { console.error('Load error', e); }
}

function saveState() {
  try {
    localStorage.setItem(DB_KEY, JSON.stringify(state));
  } catch(e) { console.error('Save error', e); }
}

// ===== COURSE DATA (100 Days) =====
// This will be loaded from course_data.js or embedded
const COURSE_DATA = [];

// ===== SPACED REPETITION =====
function getNextReviewDate(interval, rating) {
  // rating: 1=hard, 2=normal, 3=easy
  let newInterval;
  if (rating === 1) newInterval = 1; // reset
  else if (rating === 2) newInterval = interval; // maintain
  else newInterval = Math.min(interval * 2, 30); // double, max 30
  return { interval: newInterval, nextDate: addDays(new Date(), newInterval) };
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function getTodayReviewSentences() {
  const today = getToday();
  return state.sentences.filter(s => !s.nextReview || s.nextReview <= today);
}

// ===== TTS & SPEECH =====
let speakingId = 0; // cancel로 인한 onend 오발 방지용

// studySpeedOverride: 연습 중 수동 속도 조절 (null이면 자동 패턴 사용)
let studySpeedOverride = null;

function speak(text, rate = 1.0, onEnd) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const id = ++speakingId;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    // 연습 중 수동 속도가 있으면 우선, 아니면 설정 기본속도 * 전달된 rate 비율
    const baseRate = state.settings.speechRate || 1.0;
    u.rate = studySpeedOverride !== null ? studySpeedOverride : (baseRate * rate);
    if (onEnd) {
      u.onend = () => {
        if (id === speakingId) onEnd();
      };
    }
    window.speechSynthesis.speak(u);
  }
}

let recognition = null;
let isRecording = false;
let interimTranscript = '';
let recognitionCallback = null;
let accumulatedTranscript = '';

function getSpeechRecAPI() {
  // 매번 체크 — 일부 브라우저에서 지연 로드됨
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function initSpeechRecognition() {
  const API = getSpeechRecAPI();
  if (!API) {
    console.warn('SpeechRecognition not supported in this browser');
  } else {
    console.log('SpeechRecognition available:', API.name || 'webkitSpeechRecognition');
  }
}

// iOS/Chrome 호환: 매번 새 인스턴스 생성 (iOS에서는 재사용 불가)
function createRecognition() {
  const API = getSpeechRecAPI();
  if (!API) return null;
  const rec = new API();
  rec.lang = 'en-US';
  rec.maxAlternatives = 1;
  rec.continuous = false;

  // iOS Safari: interimResults 활성화 (실시간 단어 표시)
  rec.interimResults = true;
  return rec;
}

function startRecognition(callback, onInterim) {
  const API = getSpeechRecAPI();
  if (!API) {
    showToast('음성인식을 지원하지 않습니다. Chrome 브라우저에서 열어주세요. (file:// 대신 http:// 필요)');
    callback('');
    return;
  }

  // 이전 인스턴스 정리
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
  }

  recognition = createRecognition();
  if (!recognition) { callback(''); return; }

  isRecording = true;
  interimTranscript = '';
  accumulatedTranscript = '';
  recognitionCallback = callback;
  let callbackCalled = false;

  const finishWith = (text) => {
    if (callbackCalled) return;
    callbackCalled = true;
    isRecording = false;
    interimTranscript = '';
    accumulatedTranscript = '';
    recognitionCallback = null;
    callback(text);
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if (interim && onInterim) {
      interimTranscript = interim;
      onInterim(interim);
    }
    if (final) {
      accumulatedTranscript = final;
    }
  };

  recognition.onerror = (e) => {
    console.log('Speech error:', e.error);
    if (e.error === 'not-allowed') {
      showToast('마이크 권한을 허용해주세요');
    }
    finishWith(accumulatedTranscript || '');
  };

  // onend: 최종 결과 처리 (iOS에서 특히 중요)
  recognition.onend = () => {
    finishWith(accumulatedTranscript || '');
  };

  try {
    recognition.start();
  } catch(e) {
    console.error('Recognition start failed:', e);
    // HTTPS가 아니면 작동 안 할 수 있음
    if (location.protocol === 'file:') {
      showToast('음성인식은 http:// 에서만 작동합니다. 로컬 서버를 사용해주세요.');
    } else {
      showToast('음성인식 시작 실패: ' + e.message);
    }
    finishWith('');
  }
}

function stopRecognition() {
  if (recognition && isRecording) {
    try { recognition.stop(); } catch(e) {}
  }
}

function calcMatchRate(original, spoken) {
  const a = original.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/);
  const b = spoken.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/);
  if (a.length === 0 || b.length === 0) return 0;
  let matches = 0;
  a.forEach(word => { if (b.includes(word)) matches++; });
  return Math.round((matches / a.length) * 100);
}

// Generate word-by-word diff HTML
function getWordDiffHtml(original, spoken) {
  const origWords = original.replace(/[^a-zA-Z0-9\s']/g, '').trim().split(/\s+/);
  const spokenWords = spoken.replace(/[^a-zA-Z0-9\s']/g, '').trim().split(/\s+/);
  const spokenLower = spokenWords.map(w => w.toLowerCase());

  let html = '';
  origWords.forEach(word => {
    const idx = spokenLower.indexOf(word.toLowerCase());
    if (idx >= 0) {
      html += `<span class="word-correct">${escHtml(word)}</span> `;
      spokenLower[idx] = '__used__';
    } else {
      html += `<span class="word-missing">${escHtml(word)}</span> `;
    }
  });

  // Show extra spoken words that don't match
  const extraWords = spokenWords.filter((w, i) => spokenLower[i] !== '__used__' && w);
  if (extraWords.length > 0) {
    html += '<br><span style="font-size:12px;color:var(--text-secondary)">추가 발음: </span>';
    extraWords.forEach(w => {
      html += `<span class="word-wrong">${escHtml(w)}</span> `;
    });
  }

  return html;
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ===== MOTIVATIONAL MESSAGES =====
const CHEER_MESSAGES = [
  '오늘도 화이팅! 🔥', '한 문장씩, 꾸준히! 💪', '영어 실력이 쑥쑥! 🌱',
  '포기하지 마세요! ✨', '입에 달라붙을 때까지! 🎯', '매일 조금씩 성장 중! 🚀',
  '오늘의 연습이 내일의 실력! 📈', '잘하고 있어요! 👏'
];
function getCheerMessage() { return CHEER_MESSAGES[Math.floor(Math.random() * CHEER_MESSAGES.length)]; }

function showMotivateToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast motivate';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

let streakCount = 0; // 연속 정답 카운트

// ===== TAB NAVIGATION =====
let currentTab = 'practice';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderTab();
}

function renderTab() {
  const mc = document.getElementById('mainContent');
  const settingsBtn = document.getElementById('settingsBtn');
  settingsBtn.classList.remove('hidden');

  switch(currentTab) {
    case 'practice': renderPractice(mc); break;
    case 'sentences': renderMySentences(mc); break;
    case 'profile': renderProfile(mc); break;
  }
}

// ===== PRACTICE TAB (Home + Study combined) =====
function renderPractice(el) {
  document.getElementById('headerTitle').textContent = 'SpeakUp';
  const todayReview = getTodayReviewSentences();
  const todayLog = state.studyLogs.find(l => l.date === getToday());
  const studied = todayLog ? todayLog.studied : 0;
  const streak = calcStreak();
  const dayProgress = getCurrentDayProgress();
  const weakSentences = getWeakSentences();
  const reviewCount = todayReview.length;

  el.innerHTML = `
    <div style="text-align:center;margin-bottom:4px">
      <div style="font-size:14px;color:var(--text-secondary);margin-bottom:2px">
        ${dayProgress ? `Day ${dayProgress.currentDay} · ` : ''}🔥 ${streak}일 연속 · 오늘 ${studied}문장 완료
      </div>
    </div>

    <button class="hero-start" onclick="startTodayStudy()">
      <span class="hero-count">${reviewCount}</span>
      <span class="hero-label">오늘의 연습</span>
    </button>

    ${dayProgress ? `
    <div class="card" style="padding:12px 16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:15px;font-weight:700;color:var(--primary)">Day ${dayProgress.currentDay} 진행중</span>
        <span style="font-size:12px;color:var(--text-secondary)">${dayProgress.completedDays}/100일</span>
      </div>
      <div class="progress-bar-container" style="margin:4px 0">
        <div class="progress-bar-fill" style="width:${dayProgress.totalInDay ? Math.round(dayProgress.masteredInDay/dayProgress.totalInDay*100) : 0}%"></div>
      </div>
    </div>
    ` : ''}

    <div class="divider">또는</div>

    <div class="mode-row">
      <div class="mode-card" onclick="startFlashcard(20)">
        <div class="mode-icon">🃏</div>
        <div class="mode-name">플래시카드</div>
      </div>
      <div class="mode-card" onclick="startRandomStudy(20)">
        <div class="mode-icon">🎲</div>
        <div class="mode-name">랜덤 연습</div>
      </div>
      <div class="mode-card" onclick="startWeakStudy()" ${weakSentences.length === 0 ? 'style="opacity:0.4"' : ''}>
        <div class="mode-icon">💪</div>
        <div class="mode-name">약한 문장</div>
      </div>
    </div>

    <div class="card" style="padding:12px 16px">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary)">
        <span>등록 ${state.sentences.length} · 마스터 ${state.sentences.filter(s=>s.interval>=16).length}</span>
        <span>누적 ${state.totalPracticeCount || 0}회</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Day별 학습</div>
      <div class="day-selector">
        ${Array.from({length:100}, (_, i) => {
          const dayNum = i + 1;
          const daySentences = state.sentences.filter(s => s.day === dayNum);
          const hasData = daySentences.length > 0;
          return `<button class="day-btn ${hasData ? 'completed' : ''}" onclick="startDayStudy(${dayNum})" ${!hasData ? 'disabled style="opacity:0.3"' : ''}>D${dayNum}</button>`;
        }).join('')}
      </div>
    </div>
  `;
}

function getCurrentDayProgress() {
  if (state.sentences.length === 0) return null;
  // 각 Day별로 마스터 비율 계산, 아직 마스터 안 된 가장 낮은 Day = 현재 진행 Day
  const dayMap = {};
  state.sentences.forEach(s => {
    if (!s.day) return;
    if (!dayMap[s.day]) dayMap[s.day] = { total: 0, mastered: 0 };
    dayMap[s.day].total++;
    if (s.interval >= 16) dayMap[s.day].mastered++;
  });

  const dayNums = Object.keys(dayMap).map(Number).sort((a, b) => a - b);
  let currentDay = dayNums[dayNums.length - 1] || 1;
  let completedDays = 0;

  for (const d of dayNums) {
    if (dayMap[d].mastered >= dayMap[d].total) {
      completedDays++;
    } else {
      currentDay = d;
      break;
    }
  }

  return {
    currentDay,
    completedDays,
    totalInDay: dayMap[currentDay] ? dayMap[currentDay].total : 0,
    masteredInDay: dayMap[currentDay] ? dayMap[currentDay].mastered : 0,
  };
}

function calcStreak() {
  let streak = 0;
  let d = new Date();
  while (true) {
    const dateStr = d.toISOString().split('T')[0];
    const log = state.studyLogs.find(l => l.date === dateStr);
    if (log && log.studied > 0) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function renderWeekChart() {
  const days = ['일','월','화','수','목','금','토'];
  let bars = '';
  const today = new Date();
  let maxCount = 1;
  const weekData = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const log = state.studyLogs.find(l => l.date === dateStr);
    const count = log ? log.studied : 0;
    if (count > maxCount) maxCount = count;
    weekData.push({ day: days[d.getDay()], count, isToday: i === 0 });
  }
  weekData.forEach(d => {
    const h = Math.max(4, (d.count / maxCount) * 100);
    bars += `<div class="week-bar-wrap">
      <span class="week-count">${d.count || ''}</span>
      <div class="week-bar ${d.isToday ? 'today' : ''}" style="height:${h}px"></div>
      <span class="week-day">${d.day}</span>
    </div>`;
  });
  return `<div class="week-chart">${bars}</div>`;
}

function getWrongWords(original, spoken) {
  const origWords = original.toLowerCase().replace(/[^a-z'\s]/g, '').split(/\s+/).filter(Boolean);
  const spokenWords = spoken.toLowerCase().replace(/[^a-z'\s]/g, '').split(/\s+/).filter(Boolean);
  return origWords.filter(w => !spokenWords.includes(w));
}

function speakWrongWords(words) {
  if (!words.length) return;
  const text = words.join(', ');
  speak(text, 0.8);
}

function startRecWithTimeout(callback, onInterim) {

  if (recTimeoutId) clearTimeout(recTimeoutId);

function updateRepeat100UI() {
  const counter = document.getElementById('r100Counter');
  if (counter) counter.textContent = `${repeat100Count}/100`;

  const logEl = document.getElementById('r100Log');
  if (logEl && repeat100Logs.length > 0) {
    // 기존 interim 제거
    const oldInterim = document.getElementById('r100Interim');
    if (oldInterim) oldInterim.remove();

    // 전체 로그를 역순으로 렌더링 (최신이 맨 위)
    let html = '';
    for (let i = repeat100Logs.length - 1; i >= 0; i--) {
      const log = repeat100Logs[i];
      const isLatest = (i === repeat100Logs.length - 1);
      if (isLatest) {
        // 최신 항목: 큰 강조 박스
        html += `<div class="repeat100-current-sentence">
          <div class="current-label">#${log.num} ${log.type === 'listen' ? '🔊 듣기' : '🎤 말하기'}</div>
          ${escHtml(log.text)}${log.score !== undefined ? `<div style="margin-top:6px;font-size:16px;font-weight:700">${log.score}%</div>` : ''}
        </div>`;
      } else {
        // 이전 항목: 일반 로그
        html += `<div class="repeat100-log-item ${log.type}-log">
          <span class="log-num">#${log.num}</span>${escHtml(log.text)}${log.score !== undefined ? `<span class="log-score">${log.score}%</span>` : ''}
        </div>`;
      }
    }
    logEl.innerHTML = html;
  }
}

function incrementSentenceCount(type) {
  if (!studySession) return;
  const s = studySession.sentences[studySession.currentIndex];
  const found = state.sentences.find(x => x.id === s.id);
  if (found) {
    if (type === 'listen') {
      found.listenRepeatCount = (found.listenRepeatCount || 0) + 1;
    } else {
      found.speakRepeatCount = (found.speakRepeatCount || 0) + 1;
    }
    saveState();
  }
}

// ===== 듣기 100번 반복 =====
function playRepeat100Listen() {
  if (!repeat100Active || !studySession) return;
  const s = studySession.sentences[studySession.currentIndex];
  const speed = state.settings.repeatSpeed || 1.0;
  repeat100Count++;
  incrementSentenceCount('listen');

  repeat100Logs.push({ num: repeat100Count, type: 'listen', text: s.english });
  updateRepeat100UI();

  if (repeat100Count >= 100) {
    repeat100Active = false;
    showToast('듣기 100번 반복 완료! 🎉');
    setTimeout(() => closeRepeat100Popup(), 1500);
    renderStudySession();
    return;
  }
  speak(s.english, speed, () => {
    if (repeat100Active) {
      setTimeout(() => playRepeat100Listen(), 300);
    }
  });
}

// ===== 말하기 100번 반복 =====
function startRepeat100Speak() {
  if (!repeat100Active || !studySession) return;
  doOneSpeak100();
}

function doOneSpeak100() {
  if (!repeat100Active || !studySession) return;
  if (repeat100Count >= 100) {
    repeat100Active = false;
    showToast('말하기 100번 반복 완료! 🎉');
    setTimeout(() => closeRepeat100Popup(), 1500);
    renderStudySession();
    return;
  }

  // 듣기 ON이면 문장 들려주고 → 녹음, OFF이면 바로 녹음
  const s = studySession.sentences[studySession.currentIndex];
  const speed = state.settings.repeatSpeed || 1.0;

  const startRecording = () => {
    if (!repeat100Active) return;
    startRecWithTimeout((transcript) => {
      if (!repeat100Active) return;
      clearInterval(recTimerInterval);
      if (recTimeoutId) { clearTimeout(recTimeoutId); recTimeoutId = null; }

      repeat100Count++;
      incrementSentenceCount('speak');

      const match = transcript ? calcMatchRate(s.english, transcript) : 0;
      const displayText = transcript || '(인식 없음)';
      repeat100Logs.push({ num: repeat100Count, type: 'speak', text: displayText, score: match });
      updateRepeat100UI();

      // 다음 라운드
      setTimeout(() => doOneSpeak100(), 500);
    }, (interim) => {
      // 팝업 내에서 interim을 강조 박스로 맨 위에 표시
      const logEl = document.getElementById('r100Log');
      if (!logEl) return;
      let interimBox = document.getElementById('r100Interim');
      if (!interimBox) {
        interimBox = document.createElement('div');
        interimBox.id = 'r100Interim';
        interimBox.className = 'repeat100-current-sentence';
        interimBox.style.opacity = '0.85';
        logEl.prepend(interimBox);
      }
      interimBox.innerHTML = `
        <div class="current-label">#${repeat100Count + 1} 🎤 말하기</div>
        ${escHtml(interim)}...
      `;
    });
    recStartTime = Date.now();
    recTimerInterval = setInterval(() => {}, 1000); // timer for timeout
  };

  if (repeat100ListenOn) {
    speak(s.english, speed, startRecording);
  } else {
    startRecording();
  }
}

        <button class="btn-ghost" onclick="exitStudy()">← 나가기</button>
        <div style="flex:1;margin:0 12px">
          <div class="study-progress-bar" style="height:6px;border-radius:3px;background:#E5E7EB">

        <button class="study-nav-btn" onclick="nextStudySentence()">다음 →</button>

  if (step === 1) {
    // ===== 듣기 + 말하기 통합 페이지 =====
    content += `
      ${speedControlHtml}
      <div class="study-sentence-card">
        <div class="study-english">${escHtml(s.english)}</div>

            <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
            <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
          </div>
          <span style="color:var(--mic);font-size:14px">듣고 있습니다... (터치하면 종료)</span>
          <div class="rec-timer" id="recTimer"></div>
        ` : interimTranscript ? `
          <span style="color:var(--text-secondary);font-style:italic">${escHtml(interimTranscript)}</span>
        ` : `
          <div class="placeholder">아래 버튼을 눌러 학습하세요</div>
        `}
      </div>
    `;

    // Result
    if (studySession.lastMatch !== undefined && studySession.lastSpoken) {
      const scoreClass = studySession.lastMatch >= 80 ? 'score-high' : studySession.lastMatch >= 50 ? 'score-medium' : 'score-low';
      const wrongWords = getWrongWords(s.english, studySession.lastSpoken);
      content += `
        <div class="result-card">
          <div class="score-badge ${scoreClass}">일치율: ${studySession.lastMatch}%</div>
          <div style="margin:8px 0;font-size:15px;line-height:1.8">
            ${studySession.lastDiffHtml || `"${escHtml(studySession.lastSpoken)}"`}
          </div>
          ${wrongWords.length > 0 ? `
            <button class="wrong-word-hint" onclick="speakWrongWords(${escHtml(JSON.stringify(wrongWords))})">
              🔊 틀린 단어 듣기: ${escHtml(wrongWords.join(', '))}
            </button>
          ` : ''}
        </div>
      `;
    }

    // Dual buttons: 다시듣기 + 말하기
    if (!isRecording) {
      if (!repeat100Active) {
        content += `
          <div class="dual-action-row">
            <button class="dual-action-btn listen-btn" onclick="playListen3x()">🔊 다시듣기</button>
            <button class="dual-action-btn speak-btn" onclick="recordStudyStep()">🎤 말하기</button>
          </div>
          <div style="display:flex;gap:6px;margin-top:4px">
            <button class="btn-ghost" onclick="startRepeat100('listen')" style="flex:1;font-size:11px">🔊 듣기×100</button>
            <button class="btn-ghost" onclick="startRepeat100('speak')" style="flex:1;font-size:11px">🎤 말하기×100</button>
            <button class="btn-ghost" onclick="skipToStep(3)" style="flex:1;font-size:11px">안보고 말하기 →</button>
          </div>
        `;
      }
    }

  } else if (step === 3) {
    // ===== 안 보고 말하기 (자동 평가) =====
    content += `
      ${speedControlHtml}
      <div class="study-sentence-card">
        <div class="study-korean" style="font-size:20px;color:var(--text)">${escHtml(s.korean)}</div>
        <div class="study-english study-hidden" id="hiddenEnglish" onclick="this.classList.remove('study-hidden')">${escHtml(s.english)}</div>
        <div style="font-size:11px;color:#A78BFA;margin-top:4px">영어 문장을 터치하면 볼 수 있어요</div>

      </div>
      <div class="speech-area ${isRecording ? 'recording' : ''}" onclick="${isRecording ? 'stopRecEarly()' : ''}">
        ${isRecording ? `
          <div class="mic-inline">
            <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
            <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
          </div>
          <span style="color:var(--mic);font-size:14px">듣고 있습니다... (터치하면 종료)</span>
          <div class="rec-timer" id="recTimer"></div>
        ` : interimTranscript ? `
          <span style="color:var(--text-secondary);font-style:italic">${escHtml(interimTranscript)}</span>
        ` : `
          <div class="placeholder">🎤 한국어를 보고 영어로 말해보세요</div>
        `}
      </div>
    `;

    // Result + auto-evaluation
    if (studySession.lastMatch !== undefined && studySession.lastSpoken) {
      const score = studySession.lastMatch;
      const scoreClass = score >= 80 ? 'score-high' : score >= 50 ? 'score-medium' : 'score-low';
      const wrongWords = getWrongWords(s.english, studySession.lastSpoken);
      let evalMsg = '';
      if (score >= 90) evalMsg = '<span class="check-pop">✅</span> 완벽해요!';
      else if (score >= 60) evalMsg = '👍 잘했어요!';
      else evalMsg = '💪 다시 한번 도전해볼까요?';

      content += `
        <div class="result-card">

          <div style="margin:6px 0;font-size:16px;font-weight:600;text-align:center">${evalMsg}</div>
          <div style="margin:8px 0;font-size:15px;line-height:1.8">
            ${studySession.lastDiffHtml || `"${escHtml(studySession.lastSpoken)}"`}
          </div>
          ${wrongWords.length > 0 ? `
            <button class="wrong-word-hint" onclick="speakWrongWords(${escHtml(JSON.stringify(wrongWords))})">
              🔊 틀린 단어 듣기: ${escHtml(wrongWords.join(', '))}
            </button>
          ` : ''}
        </div>
      `;

      if (!isRecording) {
        if (score < 60) {
          content += `
            <button class="main-action-btn" onclick="retryFromBeginning()" style="background:var(--danger)">🔄 처음부터 다시</button>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button class="btn-ghost" onclick="recordSpeakStep()" style="flex:1">🎤 다시 말하기</button>
              <button class="btn-ghost" onclick="autoEvalAndNext()" style="flex:1">그래도 다음으로 →</button>
            </div>
          `;
        } else {
          content += `
            <button class="main-action-btn" onclick="autoEvalAndNext()">다음 문장으로 →</button>
            <button class="btn-ghost" onclick="recordSpeakStep()" style="margin-top:8px;display:block;width:100%;text-align:center">🎤 한번 더 말하기</button>

        }
      }

  if (isRecording) {

// ===== Recording timer display =====
let recStartTime = 0;
let recTimerInterval = null;

function updateRecTimer() {
  const el = document.getElementById('recTimer');
  if (!el || !isRecording) return;
  const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
  const remain = Math.max(0, 30 - elapsed);
  el.textContent = `${remain}초 남음`;
}

// ===== 다시듣기: 3회 반복 재생 =====
function playListen3x() {
  if (!studySession) return;
  const s = studySession.sentences[studySession.currentIndex];
  const speed = state.settings.repeatSpeed || 1.0;
  let count = 0;
  const maxRep = state.settings.listenRepeat;

  function playOne() {
    if (count >= maxRep || !studySession) return;
    count++;
    incrementSentenceCount('listen');
    renderStudySession();
    speak(s.english, speed, () => {
      if (count < maxRep) {
        setTimeout(() => playOne(), 400);
      }
    });
  }
  window.speechSynthesis.cancel();
  playOne();
}

// ===== 말하기 (통합 페이지용) =====
function recordStudyStep() {
  if (isRecording || !studySession) return;
  recStartTime = Date.now();
  recTimerInterval = setInterval(updateRecTimer, 1000);

  startRecWithTimeout((transcript) => {
    clearInterval(recTimerInterval);
    if (recTimeoutId) { clearTimeout(recTimeoutId); recTimeoutId = null; }
    incrementSentenceCount('speak');
    handleRecResult(transcript, 1);
    renderStudySession();
  }, onInterimUpdate);

  renderStudySession();
}

function setStudySpeed(speed) {
  studySpeedOverride = speed;
  renderStudySession();
}

function incrementPracticeCount(sentenceId) {
  const found = state.sentences.find(x => x.id === sentenceId);
  if (found) {
    found.practiceCount = (found.practiceCount || 0) + 1;
  }
  state.totalPracticeCount = (state.totalPracticeCount || 0) + 1;
  saveState();
}

function skipToStep(targetStep) {
  window.speechSynthesis.cancel();
  studySession.step = targetStep;
  studySession.repeatCount = 0;
  studySession.autoPlayed = false;
  studySession.lastMatch = undefined;
  studySession.lastSpoken = undefined;
  studySession.lastDiffHtml = undefined;
  renderStudySession();
}

function onInterimUpdate(interim) {
  interimTranscript = interim;
  const el = document.querySelector('.speech-area');
  if (el) {
    el.innerHTML = `
      <div class="mic-inline">
        <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
        <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
      </div>
      <span style="color:var(--text);font-size:15px">${escHtml(interim)}</span>
      <div class="rec-timer" id="recTimer"></div>
    `;
    updateRecTimer();
  }
}

function handleRecResult(transcript, step) {
  if (!studySession) return;
  const s = studySession.sentences[studySession.currentIndex];
  if (transcript) {
    const match = calcMatchRate(s.english, transcript);
    studySession.lastMatch = match;
    studySession.lastSpoken = transcript;
    studySession.lastDiffHtml = getWordDiffHtml(s.english, transcript);

    const found = state.sentences.find(x => x.id === s.id);
    if (found) {
      found.lastMatchRate = match;
      saveState();
    }
  } else {
    // 타임아웃 또는 터치 종료: 0%
    studySession.lastMatch = 0;
    studySession.lastSpoken = '(인식 없음)';
    studySession.lastDiffHtml = '<span class="word-wrong">(인식된 음성 없음)</span>';
  }
  interimTranscript = '';
}

function recordSpeakStep() {
  if (isRecording || !studySession) return;
  recStartTime = Date.now();
  recTimerInterval = setInterval(updateRecTimer, 1000);

  startRecWithTimeout((transcript) => {
    clearInterval(recTimerInterval);
    if (recTimeoutId) { clearTimeout(recTimeoutId); recTimeoutId = null; }
    incrementSentenceCount('speak');
    handleRecResult(transcript, 3);
    renderStudySession();
  }, onInterimUpdate);

  renderStudySession();
}

function retryCurrentSentence() {
  studySession.lastMatch = undefined;
  studySession.lastSpoken = undefined;
  studySession.lastDiffHtml = undefined;
  interimTranscript = '';
  renderStudySession();
}

function retryFromBeginning() {
  window.speechSynthesis.cancel();
  studySession.step = 1;
  studySession.repeatCount = 0;
  studySession.autoPlayed = false;
  studySession.lastMatch = undefined;
  studySession.lastSpoken = undefined;
  studySession.lastDiffHtml = undefined;
  interimTranscript = '';
  streakCount = 0;
  renderStudySession();
}

function autoEvalAndNext() {
  const s = studySession.sentences[studySession.currentIndex];
  const score = studySession.lastMatch || 0;

  // Auto rating: ≥90% = easy(3), 60-89% = normal(2), <60% = hard(1)
  let rating;
  if (score >= 90) rating = 3;
  else if (score >= 60) rating = 2;
  else rating = 1;

  // Update spaced repetition
  const found = state.sentences.find(x => x.id === s.id);
  if (found) {
    const result = getNextReviewDate(found.interval || 1, rating);
    found.interval = result.interval;
    found.nextReview = result.nextDate;
    found.lastReview = getToday();
    found.reviewCount = (found.reviewCount || 0) + 1;
  }
  incrementPracticeCount(s.id);

  // Log
  const today = getToday();
  let log = state.studyLogs.find(l => l.date === today);
  if (!log) {
    log = { date: today, studied: 0, correct: 0 };
    state.studyLogs.push(log);
  }
  log.studied++;
  if (rating >= 2) log.correct++;
  saveState();

  // Streak tracking
  if (score >= 60) {
    streakCount++;
    if (streakCount >= 5 && streakCount % 5 === 0) {
      showMotivateToast(`🔥 ${streakCount}문장 연속 성공! ${getCheerMessage()}`);
    }
  } else {
    streakCount = 0;
  }

  advanceToNext();
}

function prevStudySentence() {
  if (!studySession || studySession.currentIndex <= 0) return;
  window.speechSynthesis.cancel();
  if (isRecording) stopRecognition();
  studySession.currentIndex--;
  studySession.step = 1;
  studySession.repeatCount = 0;
  studySession.autoPlayed = false;
  studySession.lastMatch = undefined;
  studySession.lastSpoken = undefined;
  studySession.lastDiffHtml = undefined;
  interimTranscript = '';
  renderStudySession();
}

function nextStudySentence() {
  if (!studySession) return;
  window.speechSynthesis.cancel();
  if (isRecording) stopRecognition();
  const s = studySession.sentences[studySession.currentIndex];
  incrementPracticeCount(s.id);
  studySession.currentIndex++;
  if (studySession.currentIndex >= studySession.sentences.length) {
    finishStudy();
  } else {
    studySession.step = 1;
    studySession.repeatCount = 0;
    studySession.autoPlayed = false;
    studySession.lastMatch = undefined;
    studySession.lastSpoken = undefined;
    studySession.lastDiffHtml = undefined;
    interimTranscript = '';
    renderStudySession();
  }
}

function advanceToNext() {
  window.speechSynthesis.cancel();
  studySession.currentIndex++;
  if (studySession.currentIndex >= studySession.sentences.length) {
    finishStudy();
  } else {
    studySession.step = 1;
    studySession.repeatCount = 0;
    studySession.lastMatch = undefined;
    studySession.lastSpoken = undefined;
    studySession.lastDiffHtml = undefined;
    studySession.autoPlayed = false;
    interimTranscript = '';
    renderStudySession();
  }
}

function finishStudy() {
  studySession = null;
  studySpeedOverride = null;
  const mc = document.getElementById('mainContent');
  const todayLog = state.studyLogs.find(l => l.date === getToday());
  const streak = calcStreak();
  mc.innerHTML = `
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:64px;margin-bottom:16px">🎉</div>
      <h2 style="margin-bottom:8px">학습 완료!</h2>
      ${streak >= 2 ? `<div class="streak-display">🔥 ${streak}일 연속 학습 중!</div>` : ''}
      <p style="color:var(--text-secondary);margin-bottom:24px">
        오늘 ${todayLog ? todayLog.studied : 0}개 문장을 학습했습니다<br>
        총 누적 연습: ${state.totalPracticeCount || 0}회
      </p>
      <p style="font-size:18px;margin-bottom:24px">${getCheerMessage()}</p>
      <button class="main-action-btn" onclick="switchTab('practice')">홈으로 돌아가기</button>
    </div>
  `;
  document.getElementById('headerTitle').textContent = 'SpeakUp';
  document.getElementById('settingsBtn').classList.remove('hidden');
  document.querySelector('.tab-bar').style.display = '';
  streakCount = 0;
}

// ===== FLASHCARD MODE =====
let flashcardSession = null;

function startFlashcard(count) {
  if (state.sentences.length === 0) {
    showToast('문장이 없습니다. 먼저 강좌를 불러오세요');
    return;
  }
  const shuffled = [...state.sentences].sort(() => Math.random() - 0.5);
  flashcardSession = {
    sentences: shuffled.slice(0, Math.min(count, shuffled.length)),
    currentIndex: 0,
    showAnswer: false,
    lastMatch: undefined,
    lastSpoken: undefined,
    lastDiffHtml: undefined,
    correctCount: 0,
  };
  renderFlashcard();
}

  `;

    const wrongWords = getWrongWords(s.english, flashcardSession.lastSpoken);
    html += `
      <div class="result-card" style="margin-top:12px">

    `;
  }

  html += `</div></div>`; // close flashcard + flashcard-wrap

  // Speech area

    <div class="speech-area ${isRecording ? 'recording' : ''}">

        <div class="mic-inline">
          <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
          <div class="mic-inline-bar"></div><div class="mic-inline-bar"></div>
        </div>
        <span style="color:var(--mic);font-size:14px">듣고 있습니다...</span>
      ` : interimTranscript ? `
        <span style="color:var(--text-secondary);font-style:italic">${escHtml(interimTranscript)}</span>
      ` : `
        <div class="placeholder">🎤 한국어를 보고 영어로 말해보세요</div>
      `}
    </div>
  `;

  if (!isRecording) {
    // Left/Right nav buttons
    html += `<div class="fc-nav-row">
      <button class="fc-nav-btn" onclick="prevFlashcard()" ${flashcardSession.currentIndex <= 0 ? 'disabled' : ''}>← 이전</button>
      <span style="font-size:14px;color:var(--text-secondary);font-weight:600">${current} / ${total}</span>

// ===== Flashcard Swipe Gestures =====
function initFlashcardSwipe() {
  const el = document.getElementById('flashcardEl');
  if (!el) return;
  let startX = 0, currentX = 0, dragging = false;

  el.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    dragging = true;
    el.style.transition = 'none';
  }, { passive: true });

  el.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentX = e.touches[0].clientX - startX;
    el.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`;
    el.style.opacity = Math.max(0.5, 1 - Math.abs(currentX) / 300);
  }, { passive: true });

  el.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    el.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

    if (currentX > 80) {
      // Swipe right → next
      el.style.transform = 'translateX(300px) rotate(15deg)';
      el.style.opacity = '0';
      setTimeout(() => nextFlashcard(), 250);
    } else if (currentX < -80) {
      // Swipe left → prev
      el.style.transform = 'translateX(-300px) rotate(-15deg)';
      el.style.opacity = '0';
      setTimeout(() => prevFlashcard(), 250);
    } else {
      el.style.transform = '';
      el.style.opacity = '';
    }
    currentX = 0;
  });
}

function exitFlashcard() {
  window.speechSynthesis.cancel();
  if (isRecording) stopRecognition();
  flashcardSession = null;
  studySpeedOverride = null;
  interimTranscript = '';
  document.getElementById('headerTitle').textContent = 'SpeakUp';
  document.getElementById('settingsBtn').classList.remove('hidden');
  document.querySelector('.tab-bar').style.display = '';
  switchTab('practice');
}

function setFlashcardSpeed(speed) {
  studySpeedOverride = speed;
  renderFlashcard();
}

function recordFlashcard() {
  if (isRecording || !flashcardSession) return;
  const s = flashcardSession.sentences[flashcardSession.currentIndex];

  const onInterim = (interim) => {
    const el = document.querySelector('.speech-realtime');
    if (el) {
      el.textContent = interim;
    } else {
      const card = document.querySelector('.flashcard');
      if (card) {
        let rt = document.createElement('div');
        rt.className = 'speech-realtime interim';
        rt.textContent = interim;
        card.after(rt);
      }
    }
  };

  startRecognition((transcript) => {
    if (transcript) {
      const match = calcMatchRate(s.english, transcript);
      flashcardSession.lastMatch = match;
      flashcardSession.lastSpoken = transcript;
      flashcardSession.lastDiffHtml = getWordDiffHtml(s.english, transcript);

      // 80% 이상이면 정답 처리
      if (match >= 80) {
        flashcardSession.showAnswer = true;
        flashcardSession.correctCount++;
        incrementPracticeCount(s.id);
      } else {
        // 틀리면 정답도 보여줌
        flashcardSession.showAnswer = true;
      }

      const found = state.sentences.find(x => x.id === s.id);
      if (found) {
        found.lastMatchRate = match;
        saveState();
      }
    }
    renderFlashcard();
  }, onInterim);

  renderFlashcard();
}

function retryFlashcard() {
  flashcardSession.lastMatch = undefined;
  flashcardSession.lastSpoken = undefined;
  flashcardSession.lastDiffHtml = undefined;
  flashcardSession.showAnswer = false;
  interimTranscript = '';
  renderFlashcard();
}

function showFlashcardAnswer() {
  flashcardSession.showAnswer = true;
  renderFlashcard();
}

function prevFlashcard() {
  if (!flashcardSession || flashcardSession.currentIndex <= 0) return;
  window.speechSynthesis.cancel();
  flashcardSession.currentIndex--;
  flashcardSession.showAnswer = false;
  flashcardSession.lastMatch = undefined;
  flashcardSession.lastSpoken = undefined;
  flashcardSession.lastDiffHtml = undefined;
  interimTranscript = '';
  renderFlashcard();
}

function nextFlashcard() {
  window.speechSynthesis.cancel();
  const s = flashcardSession.sentences[flashcardSession.currentIndex];
  incrementPracticeCount(s.id);

  flashcardSession.currentIndex++;
  if (flashcardSession.currentIndex >= flashcardSession.sentences.length) {
    finishFlashcard();
  } else {
    flashcardSession.showAnswer = false;
    flashcardSession.lastMatch = undefined;
    flashcardSession.lastSpoken = undefined;
    flashcardSession.lastDiffHtml = undefined;
    interimTranscript = '';
    renderFlashcard();
  }
}

function finishFlashcard() {
  const correct = flashcardSession.correctCount;
  const total = flashcardSession.sentences.length;
  flashcardSession = null;
  studySpeedOverride = null;

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:64px;margin-bottom:16px">🃏</div>

        ${total}장 중 <strong style="color:var(--success)">${correct}장</strong> 정답 (${total > 0 ? Math.round(correct/total*100) : 0}%)
      </p>

    </div>
  `;

// ===== DATA MANAGEMENT =====
function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `speakup_backup_${getToday()}.json`;
  a.click();
  showToast('데이터를 내보냈습니다');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        state = { ...state, ...data };
        saveState();
        renderTab();
        showToast('데이터를 가져왔습니다');
      } catch(err) {
        showToast('파일 형식이 올바르지 않습니다');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetData() {
  if (confirm('모든 데이터를 초기화하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
    localStorage.removeItem(DB_KEY);
    state = {
      sentences: [],
      favorites: [],
      studyLogs: [],
      settings: { ...DEFAULT_SETTINGS },
      totalPracticeCount: 0,
      streak: 0,
    };
    saveState();
    renderTab();
    showToast('데이터가 초기화되었습니다');
  }
}

// ===== LOAD COURSE DATA =====
function loadCourseData() {
  if (state.sentences.some(s => s.source === '기본동사 1회')) {
    if (!confirm('이미 강좌 데이터가 있습니다. 다시 불러오시겠습니까?')) return;
    state.sentences = state.sentences.filter(s => s.source !== '기본동사 1회');
  }

  // Parse raw course data embedded below
  const courseRaw = getCourseRawData();
  let addedCount = 0;

  courseRaw.forEach(day => {
    const addSentence = (kr, en, section) => {
      if (!kr || !en) return;
      const id = `course_d${day.day}_${addedCount}`;
      state.sentences.push({
        id,
        english: en.trim(),
        korean: kr.trim(),
        memo: `Day ${day.day} - ${section}`,
        source: '기본동사 1회',
        day: day.day,
        interval: 1,
        nextReview: getToday(),
        easeFactor: 2.0,
        reviewCount: 0,
        lastReview: null,
        createdAt: getToday(),
      });
      addedCount++;
    };

    if (day.mainSentence) {
      addSentence(day.mainSentence.korean, day.mainSentence.english, '대표문장');
    }
    if (day.modelExamples) {
      day.modelExamples.forEach(ex => addSentence(ex.korean, ex.english, 'Model'));
    }
    if (day.smallTalk) {
      day.smallTalk.forEach(ex => addSentence(ex.korean, ex.english, 'Small Talk'));
    }
    if (day.furtherStudies) {
      day.furtherStudies.forEach(ex => addSentence(ex.korean, ex.english, 'Further Studies'));
    }
  });

  saveState();
  showToast(`${addedCount}개 문장을 불러왔습니다`);
  renderTab();
}

{day:2,title:"Have 2",mainSentence:{korean:"방금 간식을 먹었더니 배가 별로 안 고파요.",english:"I just had a snack, so I'm not that hungry."},modelExamples:[{korean:"나는 아침으로 주로 시리얼을 먹는다.",english:"I usually have cereal for breakfast."},{korean:"저는 스테이크 먹을게요.",english:"I'll have the steak, please."},{korean:"오늘 점심으로 아무것도 안 먹었어요.",english:"I didn't have anything for lunch today."},{korean:"출발하기 전에 뭐라도 먹어야 해.",english:"You should have something before you leave."}],smallTalk:[{korean:"수업 전에 뭐 좀 먹었어?",english:"Did you have anything before?"},{korean:"그냥 바나나 하나 먹었어. 시간이 없었어.",english:"Just a banana. I was in a rush."},{korean:"점심은 주로 몇 시에 먹어요?",english:"What time do you usually have lunch?"},{korean:"오, 저도 그런데 오늘 저랑 뭐 간단히 먹을래요?",english:"Oh, me too. Want to grab something together today?"},{korean:"좋죠. 한국 음식이라면 좋아요.",english:"Sure. I could go for some Korean food."}],furtherStudies:[{korean:"어제 공원에서 널 봤어.",english:"I saw you at the park yesterday."},{korean:"어제 공원에서 널 지켜봤어.",english:"I watched you at the park yesterday."},{korean:"그 영화를 대형 화면으로 봤어.",english:"I saw the movie on the big screen."}]},
{day:3,title:"Have 3",mainSentence:{korean:"어제 아침에는 별 일이 다 있었어요.",english:"I had a weird morning yesterday."},modelExamples:[{korean:"우리는 지난주 일본에서 정말 좋은 시간을 보냈어요.",english:"We had a great time in Japan last week."},{korean:"힘든 어린 시절을 보냈다.",english:"I had a rough childhood."},{korean:"제가 접속 상태가 안 좋은 것 같습니다.",english:"I think I have a bad connection."},{korean:"저희는 만나면 늘 대화가 즐겁습니다.",english:"We always have such good conversations."},{korean:"그는 비행기를 오래 타서 잠을 좀 더 자야 해요.",english:"He had a long flight, so he needs some extra sleep."}],smallTalk:[{korean:"여전히 예술학교에 진학할 계획이니?",english:"Are you still planning to go to art school?"},{korean:"잘 모르겠어. 전공 때문에 엄마랑 사이가 틀어졌거든.",english:"I'm not sure. My mom and I had a falling out over my major."},{korean:"안녕. 최근에 잘 안 보이더라.",english:"Hey, I haven't seen you around lately."},{korean:"어, 한 주 동안 마음이 좀 힘들었거든.",english:"I know I had a rough week emotionally."}],furtherStudies:[{korean:"내가 어렸을 때 우리 이웃이 나무에서 떨어졌어요.",english:"My neighbor fell out of a tree when I was young."},{korean:"아무래도 버스에서 내리다 핸드폰이 주머니에서 빠진 것 같아.",english:"I think my phone fell out of my pocket while I was getting off the bus."},{korean:"그 두 사람 크리스마스 이후로 사이가 완전히 틀어졌대.",english:"Those two had a major falling out after Christmas."},{korean:"제 동업자와 저는 돈 문제로 사이가 멀어졌어요.",english:"My business partner and I had a falling out over money."}]},
{day:4,title:"Have 4",mainSentence:{korean:"삼성이 오늘 신제품 출시 행사를 열어요.",english:"Samsung is having a new product launch today."},modelExamples:[{korean:"제가 이번 주말에 집들이를 합니다.",english:"I'm having a housewarming party this weekend."},{korean:"백화점들이 이번 주에 일제히 세일을 한다.",english:"The department stores are all having sales this week."},{korean:"우리는 6월에 코엑스에서 채용 박람회를 열었다.",english:"We had a job fair at COEX in June."},{korean:"이번 주말에 모임이 있으니 오고 싶으면 오렴.",english:"We're having a get together this weekend if you want to join."}],smallTalk:[{korean:"여행용 가방을 새로 사야 해.",english:"I need to buy some new luggage."},{korean:"아, 코스트코에서 지금 샘소나이트 여행 가방 세일 중인데.",english:"Oh, Costco is having a sale on Samsonite luggage right now."},{korean:"준호 씨, 브라질 생활 어때요?",english:"How is life in Brazil treating you, Juno?"},{korean:"지금쯤이면 친구도 사귀였겠어요.",english:"Do you have any friends yet?"}],furtherStudies:[{korean:"퇴근은 한 거지.",english:"Did you leave work yet?"},{korean:"엄마한테 전화한 거지?",english:"Did you call your mom yet?"},{korean:"저녁은 먹은 거지?",english:"Did you eat dinner yet?"},{korean:"집안일은 다 한 거지?",english:"Did you finish your chores yet?"}]},
{day:5,title:"Have 5",mainSentence:{korean:"오후에는 집안일을 좀 해야 해요.",english:"I have some chores to do in the afternoon."},modelExamples:[{korean:"할 일이 산더미 같이 쌓여 있다.",english:"I have tons of work to do."},{korean:"답장해야 할 이메일이 몇 개 있다.",english:"I have a few emails to reply to."},{korean:"오늘 오후에 몇 가지 볼 일이 좀 있다.",english:"I have some errands to run this afternoon."},{korean:"금요일까지 프로젝트 하나를 마무리해야 한다.",english:"We have a project to finish by Friday."},{korean:"크리스마스 쇼핑을 좀 해야 한다.",english:"I have some Christmas shopping to do."}],smallTalk:[{korean:"안녕하세요, 제리. 우리 방금 프로젝트 진행 상황에 대해 이야기하고 있었어요.",english:"Good morning, Jerry. We were just talking about the project updates."},{korean:"네. 늦어서 죄송해요. 뭐 좀 처리할게 있었어요.",english:"Yes. Sorry. I'm late. I had something to take care of."},{korean:"오늘 바빠? 점심 같이 하자.",english:"Are you busy today? Let's have lunch."},{korean:"중고나라에서 바지 다섯 개를 팔아서 택배 붙일게 많아.",english:"I just sold five pairs of pants so I have a lot of packages to ship."}],furtherStudies:[{korean:"이번 주말에 친구 고양이를 돌봐 주기로 했어.",english:"I'm taking care of my friend's cat this weekend."},{korean:"저희 아빠는 건강을 좀 더 신경 쓰셔야 해요.",english:"My dad needs to take better care of his health."},{korean:"휴가 가기 전에 처리해야 할 일이 좀 있어.",english:"I have some work to take care of before I start my vacation."},{korean:"저희 엄마는 주로 오후 시간에 정원을 손질하십니다.",english:"My mom usually takes care of our garden in the afternoons."}]},
{day:6,title:"Have 6",mainSentence:{korean:"교토에 있는 기온거리는 분위기가 참 매력적이에요.",english:"Gion Street in Kyoto has such a captivating vibe."},modelExamples:[{korean:"이 컵은 손잡이가 독특하다.",english:"This cup has a unique handle."},{korean:"내가 새로 산 차는 시트가 가죽이다.",english:"My new car has leather seats."},{korean:"이 바지는 주머니가 없다.",english:"These pants don't have pockets."},{korean:"최신 모델은 디자인이 아주 잘 빠졌다.",english:"The new model has a sleek design."},{korean:"그 사람은 성격이 참 좋아요.",english:"He has a great personality."}],smallTalk:[{korean:"난 북촌에서 하루 종일 시간 보낼 수 있어.",english:"I could spend all day in Bukchon."},{korean:"무슨 말인지 알지? 북촌이 나름의 운치가 있잖아.",english:"I know what you mean. Bukchon has its own charm."},{korean:"그분 정치인 치고는 재미있는 배경을 가지고 있어.",english:"He has an interesting background for a politician."}],furtherStudies:[{korean:"당신은 목소리가 좋군요.",english:"You have a good voice."},{korean:"당신의 논리에는 모순이 있어요.",english:"Your argument has a flaw."},{korean:"홍삼은 건강에 정말 좋다.",english:"Red ginseng has a lot of health benefits."},{korean:"둘 다 장단점이 있네. 일단은 계속 알아보는게 좋겠어.",english:"They both have pros and cons. Maybe we should keep looking for now."}]},
{day:7,title:"Have 7",mainSentence:{korean:"우리를 저녁 식사에 불러 줘서 고마워요.",english:"Thank you for having us over for dinner."},modelExamples:[{korean:"나는 간단한 메모를 위해 항상 펜을 곁에 둔다.",english:"I always have a pen nearby to take quick notes."},{korean:"식사에 누구를 부를 거니?",english:"Who are you having over for your birthday dinner?"},{korean:"돌아와서 좋습니다. 많이 그리웠어요.",english:"It's great to have you back. We missed you a lot."},{korean:"현금 갖고 있니?",english:"Do you have any cash on you?"},{korean:"나는 차 안에 있을 때 라디오를 켜두는 편이다.",english:"I like to have the radio on when in the car."}],smallTalk:[{korean:"타라. 다음 주 금요일 내 생일 저녁 식사에 올래요?",english:"Would you like to come to my birthday dinner next Friday?"},{korean:"물론이죠. 갈게요. 또 누가 오나요?",english:"Of course, I'll be there. Who else are you having over?"},{korean:"좋네요. 새로운 친구를 사귈 수도 있겠네요. 초대해 줘서 고마워요.",english:"Cool. Maybe I can make some new friends. Thanks for having me."}],furtherStudies:[{korean:"그녀를 두어번 만났다.",english:"I've met her a couple of times."},{korean:"이거 마무리하려면 몇 분 더 필요해.",english:"I need a few minutes to finish this."},{korean:"친구 몇 명을 초대했다.",english:"I invited a few friends over."}]},
{day:8,title:"Have 8",mainSentence:{korean:"다니엘에게 태워 달라고 할 수도 있잖아요.",english:"You could have Daniel give you a ride."},modelExamples:[{korean:"남편한테 역 근처에서 만나라고 할게요.",english:"I'll have my husband meet you near the station."},{korean:"제프한테 운동 조언을 좀 부탁하면 어떨까?",english:"Maybe you could have Jeff give you some exercise tips."},{korean:"저희 비서한테 다시 전화드리라고 해 둘게요.",english:"I will have my secretary get back to you."},{korean:"그분한테 내 사무실로 들으라고 해요. 이력서 검토해 볼게요.",english:"Have him stop by my office and I'll take a look at his resume."}],smallTalk:[{korean:"니콜라스한테 한번 봐달라고 해봐. 그 친구 컴퓨터 잘 다루잖아.",english:"Have Nicholas take a look at it. He's good with computers."},{korean:"김윤아 변호사님과 통화 가능할까요?",english:"Could I speak with attorney Kim Yuna?"},{korean:"저에게 전화 부탁드린다고 전해 주시겠어요?",english:"Could you have her call me back, please?"}],furtherStudies:[{korean:"신분증 좀 볼 수 있을까요?",english:"May I see your ID?"},{korean:"전화 주신 분은 누구신가요?",english:"May I ask who's calling?"},{korean:"죄송한데 먼저 일어나 봐도 될까요?",english:"May I go now?"},{korean:"들어가도 될까요?",english:"May I come in?"},{korean:"로비에서 기다려 주시겠어요?",english:"May I ask you to take a seat in the lobby, please?"}]},
{day:9,title:"Get 1",mainSentence:{korean:"남자 친구가 콘서트 표를 구했어요.",english:"My boyfriend got a ticket to the concert."},modelExamples:[{korean:"지난주에 이 핸드폰 샀어.",english:"I got this last week."},{korean:"이 신발 이탈리아에서 구했어.",english:"I got these shoes from Italy."},{korean:"이 그림 벼룩시장에서 샀어.",english:"I got this painting from the flea market."},{korean:"이 가죽 재킷은 어디서 산 거야?",english:"Where did you get this leather jacket?"}],smallTalk:[{korean:"이 명품가방은 어떻게 구한 거야?",english:"How did you get this designer bag?"},{korean:"온라인에서 샀어. 소매가보다 두 배 비싸지만 그 값은 하더라.",english:"I bought it online. It was twice as much as the retail price, but it was worth it."},{korean:"코비 신발 어디서 구할 수 있는지 아니?",english:"Do you know where I can get a pair of Kobe?"}],furtherStudies:[{korean:"이 속편은 원작의 절반에도 못 미치네요.",english:"This sequel is not even half as good as the original."},{korean:"성수동 집세가 우리 동네보다 세 배나 더 비싸다.",english:"Rent in Seongsu-dong is three times more expensive than our neighborhood."},{korean:"이 샌드위치가 빅맥에 비해 칼로리가 두 배 이상 높다.",english:"This sandwich has more than double the calories of a Big Mac."}]},
{day:10,title:"Get 2",mainSentence:{korean:"거기 자리 잡으려면 엄청 미리 예약해야 해요.",english:"You have to book way in advance to get a table there."},modelExamples:[{korean:"드디어 서울 마라톤 대회 참가 자격을 얻었다.",english:"I finally got to qualify for the Seoul Marathon."},{korean:"이번 여름에 샌프란시스코에서 인턴을 하고 싶습니다.",english:"I'm hoping to get an internship in San Francisco this summer."},{korean:"장학금을 못 받으면 이번 학기를 못 다닐 것 같아.",english:"If I don't get a scholarship, I won't be able to go this semester."},{korean:"우리는 강남에는 집 못 얻을 듯해.",english:"I don't think we can get a place in Gangnam."},{korean:"무대 가까운 자리를 못 구했어.",english:"We couldn't get a spot near the stage."}],smallTalk:[{korean:"그 로펌에서 면접 보게 된 거지.",english:"Did you get an interview at that law firm yet?"},{korean:"아니, 아직 기다리는 중이야.",english:"Not yet. I'm still waiting."},{korean:"사실 예약 못 했어. 앞으로 3개월 동안 예약이 꽉 찼더라고.",english:"I couldn't get a reservation. They're booked for the next three months."}],furtherStudies:[{korean:"테일러 스위프트 콘서트 표 구했어?",english:"Did you get tickets to the Taylor Swift concert?"},{korean:"아니, 몇 분 만에 매진되었어. 너무 속상했어.",english:"No, they sold out in minutes. I was so bummed out."}]},
